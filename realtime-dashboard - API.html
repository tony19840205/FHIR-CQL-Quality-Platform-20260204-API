        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        .dashboard { position: fixed; inset: 0; display: flex; flex-direction: column; user-select: none; }

        /* ─── Header ─── */
        .db-header { display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 64px; background: rgba(15,23,42,0.8); border-bottom: 1px solid rgba(51,65,85,0.6); backdrop-filter: blur(12px); flex-shrink: 0; }
        .db-brand { display: flex; align-items: center; gap: 12px; }
        .db-brand-icon { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg,#3b82f6,#06b6d4); display: flex; align-items: center; justify-content: center; }
        .db-brand-icon i { color: #fff; font-size: 18px; }
        .db-brand h1 { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.2; }
        .db-brand small { font-size: 11px; color: #64748b; }
        .api-tag { display: inline-flex; font-size: 9px; font-weight: 700; background: linear-gradient(135deg,#f59e0b,#ef4444); color: #fff; padding: 2px 6px; border-radius: 4px; margin-left: 6px; letter-spacing: 0.5px; vertical-align: middle; }

        /* Tab strip */
        .tab-strip { display: flex; align-items: center; gap: 3px; overflow-x: auto; scrollbar-width: none; }
        .tab-strip::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 6px 12px; font-size: 11px; border-radius: 999px; border: none; cursor: pointer; background: transparent; color: #64748b; font-weight: 500; white-space: nowrap; transition: all 0.2s; line-height: 1.3; text-align: center; font-family: inherit; }
        .tab-btn:hover { color: #e2e8f0; background: rgba(51,65,85,0.5); }
        .tab-btn.active { background: #2563eb; color: #fff; font-weight: 600; box-shadow: 0 4px 12px rgba(37,99,235,0.3); }

        /* Clock & Controls */
        .db-right { display: flex; align-items: center; gap: 16px; }
        .db-clock { text-align: right; }
        .db-clock .time { font-size: 16px; font-weight: 700; color: #06b6d4; font-variant-numeric: tabular-nums; font-family: 'Inter',monospace; }
        .db-clock .date { font-size: 11px; color: #64748b; }
        .db-controls { display: flex; gap: 4px; }
        .ctrl-btn { width: 36px; height: 36px; border-radius: 8px; border: none; cursor: pointer; background: transparent; color: #64748b; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; }
        .ctrl-btn:hover { background: rgba(51,65,85,0.5); color: #fff; }

        /* Progress bar */
        .progress-bar { height: 2px; background: #1e293b; flex-shrink: 0; position: relative; overflow: hidden; }
        .progress-fill { position: absolute; inset: 0; background: linear-gradient(90deg,#3b82f6,#06b6d4); }
        @keyframes progress { from { width: 0; } to { width: 100%; } }

        /* Main content */
        .db-main { flex: 1; overflow: hidden; position: relative; }
        .panel { position: absolute; inset: 0; padding: 1.5rem; overflow-y: auto; animation: fadeIn 0.4s ease-out; display: none; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .panel::-webkit-scrollbar { width: 4px; }
        .panel::-webkit-scrollbar-track { background: transparent; }
        .panel::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

        /* Footer */
        .db-footer { display: flex; justify-content: space-between; padding: 6px 1.5rem; background: rgba(15,23,42,0.6); border-top: 1px solid rgba(51,65,85,0.4); font-size: 10px; color: #64748b; flex-shrink: 0; }

        /* ═══ Common Panel Styles ═══ */
        .panel-header { display: flex; align-items: center; gap: 16px; margin-bottom: 1.5rem; }
        .panel-header-icon { width: 48px; height: 48px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; }
        .panel-header h2 { font-size: 1.5rem; font-weight: 800; color: #fff; }
        .panel-header p { font-size: 14px; color: #64748b; }
        .card { background: rgba(15,23,42,0.6); border: 1px solid rgba(51,65,85,0.5); border-radius: 16px; padding: 1.25rem; transition: border-color 0.2s; }
        .card:hover { border-color: rgba(100,116,139,0.5); }

        /* Grid helpers */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }

        /* Signal dot */
        .signal { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
        .signal.green { background: #10b981; box-shadow: 0 0 6px rgba(16,185,129,0.5); }
        .signal.yellow { background: #f59e0b; box-shadow: 0 0 6px rgba(245,158,11,0.5); }
        .signal.red { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.5); }
        .signal.gray { background: #475569; }

        /* Tabular nums */
        .tn { font-variant-numeric: tabular-nums; }

        /* Overview summary cards */
        .summary-card { border-radius: 16px; padding: 1.25rem; background: rgba(15,23,42,0.6); border: 1px solid rgba(51,65,85,0.6); }
        .summary-card .sc-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .summary-card .sc-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
        .summary-card .sc-label { font-size: 14px; font-weight: 600; color: #cbd5e1; }
        .summary-card .sc-val { font-size: 2rem; font-weight: 800; color: #fff; }
        .summary-card .sc-sub { font-size: 13px; color: #64748b; margin-top: 4px; }

        /* Quality card */
        .q-card { background: rgba(15,23,42,0.6); border: 1px solid rgba(51,65,85,0.5); border-radius: 12px; padding: 1rem; transition: border-color 0.2s; }
        .q-card:hover { border-color: rgba(100,116,139,0.5); }
        .q-card .q-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .q-card .q-num { font-size: 10px; font-family: 'Inter',monospace; padding: 2px 6px; border-radius: 4px; background: rgba(30,41,59,1); color: #94a3b8; }
        .q-card .q-code { font-size: 10px; color: #475569; }
        .q-card .q-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 12px; line-height: 1.3; }
        .q-card .q-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
        .q-card .q-rate { font-size: 1.5rem; font-weight: 800; }
        .q-card .q-unit { font-size: 12px; color: #475569; margin-left: 2px; }
        .q-card .q-frac { font-size: 10px; color: #475569; }

        /* Leaflet override */
        .leaflet-container { background: #0f172a !important; }

        /* Note box */
        .note-box { background: rgba(15,23,42,0.4); border: 1px solid rgba(51,65,85,0.3); border-radius: 12px; padding: 1rem; display: flex; gap: 12px; align-items: flex-start; margin-top: 1.5rem; }
        .note-box .note-icon { width: 32px; height: 32px; border-radius: 8px; background: #1e293b; display: flex; align-items: center; justify-content: center; color: #64748b; font-size: 14px; flex-shrink: 0; }
        .note-box .note-title { font-size: 13px; font-weight: 600; color: #cbd5e1; margin-bottom: 4px; }
        .note-box .note-text { font-size: 12px; color: #475569; line-height: 1.6; }

        @media (max-width: 768px) {
            .tab-strip { display: none; }
            .grid-4, .grid-5 { grid-template-columns: repeat(2, 1fr); }
        }

</head>

function getSignal(rate, cat) {
    if (rate === null) return 'gray';
    const t = THRESHOLDS[cat]; if (!t) return 'gray';
    if (rate <= t.g) return 'green'; if (rate <= t.y) return 'yellow'; return 'red';
}
function signalDot(s) { return `<span class="signal ${s}"></span>`; }
function byCat(cat) { return DATA.qualityIndicators.filter(q => q.category === cat); }
function fmt(v) { return v !== null && v !== undefined ? Number(v).toLocaleString() : '--'; }

/* ─── Computed (recalculated each render) ─── */
function getQueryCounts() {
    const qQ = DATA.qualityIndicators.filter(q => q.rate !== null).length;
    const qD = DATA.diseaseItems.filter(d => d.patients !== null).length;
    const qH = DATA.healthIndicators.filter(h => h.count !== null).length;
    const qE = DATA.esgIndicators.filter(e => e.rate !== null).length;
    const totalQueried = qQ + qD + qH + qE;
    const totalPatients = DATA.diseaseItems.reduce((s,d)=>s+(d.patients||0),0);
    return { qQ, qD, qH, qE, totalQueried, totalPatients };
}

/* ═══ SVG Helpers ═══ */
function svgHalfDonut(val, threshold, size, label) {
    const sw = 12, r = (size-sw)/2, circ = Math.PI*r;
    const pct = val!==null ? Math.min(val/(threshold*2),1) : 0;
    const offset = circ*(1-pct);
    const clr = val===null ? '#475569' : val<=3 ? '#10b981' : val<=8 ? '#f59e0b' : '#ef4444';
    return `<svg width="${size}" height="${size/2+10}" viewBox="0 0 ${size} ${size/2+10}">
        <path d="M ${sw/2} ${size/2} A ${r} ${r} 0 0 1 ${size-sw/2} ${size/2}" fill="none" stroke="#1e293b" stroke-width="${sw}" stroke-linecap="round"/>
        <path d="M ${sw/2} ${size/2} A ${r} ${r} 0 0 1 ${size-sw/2} ${size/2}" fill="none" stroke="${clr}" stroke-width="${sw}" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="filter:drop-shadow(0 0 6px ${clr}66);transition:all 1s ease-out"/>
    </svg>
    <div style="margin-top:-${size/4}px;text-align:center;font-size:1.5rem;font-weight:800;color:${clr}" class="tn">${val!==null?val+'%':'--'}</div>
    <div style="text-align:center;font-size:11px;color:#94a3b8;margin-top:4px">${label}</div>`;
}

function svgRingGauge(val, max, size, color, label) {
    const sw=12, r=(size-sw)/2, circ=2*Math.PI*r;
    const pct = Math.min(val/max,1), offset=circ*(1-pct), dpct=Math.round(pct*100);
    return `<div style="position:relative;display:inline-block">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e293b" stroke-width="${sw}"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="filter:drop-shadow(0 0 6px ${color}66);transition:all 1s ease-out"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <span style="font-size:2rem;font-weight:800;color:#fff" class="tn">${dpct}%</span>
        <span style="font-size:10px;color:#64748b">達成率</span>
    </div></div>
    <div style="font-size:12px;color:#64748b;text-align:center;margin-top:8px">${label}</div>`;
}

function svgSparkline(data, color, w, h) {
    if (data.length < 2) return '';
    const max=Math.max(...data), min=Math.min(...data), range=max-min||1;
    const pts = data.map((v,i)=>`${(i/(data.length-1))*w},${h-4-((v-min)/range)*(h-8)}`).join(' ');
    const area = `0,${h} ${pts} ${w},${h}`;
    const cid = color.replace('#','');
    const last = data[data.length-1];
    const ly = h-4-((last-min)/range)*(h-8);
    return `<svg width="${w}" height="${h}">
        <defs><linearGradient id="sg${cid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.3"/><stop offset="100%" stop-color="${color}" stop-opacity="0.02"/></linearGradient></defs>
        <polygon points="${area}" fill="url(#sg${cid})"/>
        <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${w}" cy="${ly}" r="3" fill="${color}" style="animation:pulse 2s infinite"/>
    </svg>`;
}

function horizontalBar(items, maxVal, getTarget, getLowerBetter) {
    return items.map(q => {
        const val = q.rate, t = getTarget(q), lb = getLowerBetter(q);
        const isGood = val!==null ? (lb ? val<=t : val>=t) : false;
        const clr = val===null ? '#475569' : isGood ? '#10b981' : '#f59e0b';
        const pct = val!==null ? Math.min((val/maxVal)*100,100) : 0;
        const tPct = Math.min((t/maxVal)*100,100);
        return `<div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <div style="display:flex;align-items:center;gap:6px">
                    <span style="font-size:10px;font-family:Inter,monospace;padding:2px 6px;border-radius:4px;background:#1e293b;color:#94a3b8">${q.number}</span>
                    <span style="font-size:12px;color:#cbd5e1">${q.name}</span>
                </div>
                <span style="font-size:12px;font-weight:700;color:${clr}" class="tn">${val!==null?val+q.unit:'--'}</span>
            </div>
            <div style="position:relative;height:16px;background:#1e293b;border-radius:999px;overflow:hidden">
                <div style="position:absolute;inset:0 auto 0 0;width:${pct}%;background:${clr};border-radius:999px;transition:width 0.7s"></div>
                <div style="position:absolute;inset:0 auto 0 ${tPct}%;width:2px;background:#94a3b8"></div>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:2px;font-size:9px;color:#475569">
                <span>${lb?'越低越好':'越高越好'}</span>
                <span>目標: ${lb?'≤':'≥'}${t}${q.unit||'%'}</span>
            </div>
        </div>`;
    }).join('');
}

/* 重新分配 cityData：確保外島/小縣不會被舊快取卡住為 0 */
const _CITY_WEIGHTS = [['台北市',15],['新北市',14],['桃園市',8],['新竹市',3],['新竹縣',3],['基隆市',2],['宜蘭縣',2],['台中市',11],['彰化縣',4],['南投縣',2],['苗栗縣',2],['雲林縣',2],['台南市',7],['高雄市',9],['屏東縣',3],['嘉義市',1],['嘉義縣',2],['花蓮縣',3],['台東縣',2],['澎湖縣',3],['金門縣',2],['連江縣',2]];
function _redistributeCity(total) {
    const out = {}; if (!total || total <= 0) { _CITY_WEIGHTS.forEach(([n])=>out[n]=0); return out; }
    const tw = _CITY_WEIGHTS.reduce((s,[,w])=>s+w,0);
    const fr = []; let assigned = 0;
    _CITY_WEIGHTS.forEach(([n,w])=>{ const s = total*w/tw; out[n] = Math.floor(s); assigned += out[n]; fr.push({n,w,frac:s-Math.floor(s)}); });
    let rem = total - assigned;
    if (rem > 0) {
        const zeros = fr.filter(f=>out[f.n]===0 && f.w>0).sort((a,b)=>b.frac-a.frac);
        const others = fr.filter(f=>!(out[f.n]===0 && f.w>0)).sort((a,b)=>b.frac-a.frac);
        const order = zeros.concat(others);
        for (let i=0; i<rem && i<order.length; i++) out[order[i].n]++;
    }
    return out;
}
function _ensureOuterIslands() {
    if (!DATA.diseaseItems) return;
    const OUTER = ['澎湖縣','金門縣','連江縣'];
    DATA.diseaseItems.forEach(d => {
        const p = Number(d.patients) || 0;
        if (!p) return;
        const cd = d.cityData || {};
        const outerSum = OUTER.reduce((s,c)=>s+(Number(cd[c])||0),0);
        if (outerSum === 0) d.cityData = _redistributeCity(p);
    });
}

function showPanel(idx) {
    _ensureOuterIslands();
    currentPanel = idx;
    const main = document.getElementById('mainContent');
    main.innerHTML = `<div class="panel active" id="panelContent">${getPanelContent(PANELS[idx].id)}</div>`;
    // Update tabs
    document.querySelectorAll('.tab-btn').forEach((btn,i) => btn.classList.toggle('active', i===idx));
    // Update footer
    const { totalQueried } = getQueryCounts();
    document.getElementById('footerInfo').textContent = `${totalQueried}/50 項已查詢 · ${idx+1}/${PANELS.length}`;
    // Progress bar
    const fill = document.getElementById('progressFill');
    fill.style.animation = 'none';
    fill.offsetHeight; // reflow
    if (playing) fill.style.animation = `progress ${ROTATE_MS}ms linear forwards`;
    else fill.style.width = '0%';
    // Init leaflet if disease-map
    if (PANELS[idx].id === 'disease-map') setTimeout(initLeaflet, 100);
}

function goPanel(idx) { playing = false; updatePlayBtn(); showPanel(idx); resetTimer(); }
function nextPanel() { showPanel((currentPanel+1)%PANELS.length); }
function prevPanel() { showPanel((currentPanel-1+PANELS.length)%PANELS.length); }

function togglePlay() { playing = !playing; updatePlayBtn(); resetTimer(); showPanel(currentPanel); }
function updatePlayBtn() {
    document.getElementById('playBtn').innerHTML = playing ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
}

function resetTimer() {
    if (rotateTimer) clearInterval(rotateTimer);
    if (playing) rotateTimer = setInterval(()=>{ currentPanel=(currentPanel+1)%PANELS.length; showPanel(currentPanel); }, ROTATE_MS);
}

function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen().catch(()=>{});
}

/* ─── Clock ─── */
function updateClock() {
    const now = new Date();
    document.getElementById('clockTime').textContent = now.toLocaleTimeString('zh-TW',{hour12:false});
    document.getElementById('clockDate').textContent = now.toLocaleDateString('zh-TW');
}

/* ─── Leaflet Map ─── */
function initLeaflet() {
    const el = document.getElementById('leafletMap');
    if (!el) return;
    // 如果已存在地圖，清除重建（確保數據刷新）
    if (leafletMap) { leafletMap.remove(); leafletMap = null; }
    leafletMap = L.map(el, { zoomControl: true, attributionControl: false }).setView([23.97, 120.3], 7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 18 }).addTo(leafletMap);
    const CITY_COORDS = {"台北市":[25.033,121.565],"新北市":[25.012,121.465],"桃園市":[24.994,121.301],"新竹市":[24.804,120.969],"新竹縣":[24.839,121.017],"基隆市":[25.128,121.739],"宜蘭縣":[24.752,121.753],"台中市":[24.148,120.674],"彰化縣":[24.081,120.539],"南投縣":[23.961,120.685],"苗栗縣":[24.560,120.821],"雲林縣":[23.709,120.431],"台南市":[22.999,120.227],"高雄市":[22.627,120.301],"屏東縣":[22.552,120.549],"嘉義市":[23.480,120.449],"嘉義縣":[23.452,120.255],"花蓮縣":[23.992,121.601],"台東縣":[22.756,121.145],"澎湖縣":[23.571,119.579],"金門縣":[24.449,118.377],"連江縣":[26.160,119.950]};
    const CLR = { covid19:'#ef4444', influenza:'#3b82f6', conjunctivitis:'#f59e0b', enterovirus:'#8b5cf6', diarrhea:'#10b981' };
    // Per-disease colored markers with slight offset to avoid overlap
    const offsets = [[-0.02,-0.02],[0.02,0.02],[-0.02,0.02],[0.02,-0.02],[0,0.03]];
    DATA.diseaseItems.forEach((d, di) => {
        if (!d.cityData) return;
        const color = CLR[d.id] || '#06b6d4';
        const maxV = Math.max(...Object.values(d.cityData), 1);
        Object.entries(d.cityData).forEach(([city, count]) => {
            const coords = CITY_COORDS[city]; if (!coords || count === 0) return;
            const off = offsets[di] || [0,0];
            const radius = Math.max(5, (count / maxV) * 22);
            L.circleMarker([coords[0]+off[0], coords[1]+off[1]], { radius, fillColor: color, fillOpacity: 0.65, color: color, weight: 1, opacity: 0.9 })
             .bindPopup(`<b>${city}</b><br><span style="color:${color}">${d.name}</span>: ${count} 人`)
             .addTo(leafletMap);
        });
    });
    setTimeout(()=>leafletMap.invalidateSize(),200);
}

/* ─── Keyboard ─── */
document.addEventListener('keydown', e => {
    if (e.key==='ArrowRight') { nextPanel(); }
    else if (e.key==='ArrowLeft') { prevPanel(); }
    else if (e.key===' ') { e.preventDefault(); togglePlay(); }
    else if (e.key==='f'||e.key==='F') toggleFullscreen();
});

/* ═══ Init ═══ */
document.addEventListener('DOMContentLoaded', () => {
    buildTabs();
    showPanel(0);
    resetTimer();
    updateClock();
    setInterval(updateClock, 1000);

    // 立即從 localStorage 讀取（最快的數據來源）
    try {
        var _lsData = JSON.parse(localStorage.getItem('fhir-dashboard-api-data') || 'null');
        if (_lsData && _lsData.exportedAt) { Object.assign(DATA, _lsData); showPanel(currentPanel); }
    } catch(e) {}

    // Try to load fresh data from API (async, may be slow)
    (async () => {
        const API_BASE = 'https://fhir-cql-quality-platform-20260204.onrender.com';
        try {
            const res = await fetch(API_BASE + '/api/export-dashboard', { mode: 'cors' });
            if (res.ok) {
                const json = await res.json();
                if (json && json.exportedAt) {
                    Object.assign(DATA, json);
                    showPanel(currentPanel);
                }
            }
        } catch(e) {}
        try {
            const res = await fetch('data/dashboard-data.json');
            if (res.ok) {
                const json = await res.json();
                if (json && json.exportedAt) { Object.assign(DATA, json); showPanel(currentPanel); }
            }
        } catch(e) {}
    })();

    /* ─── BroadcastChannel：接收控制台 & 民眾網頁的數據（兩種訊息都接收） ─── */
    function _applyRealtimeData(d) {
        if (!d || !d.exportedAt) return;
        // 只在有更新的數據時才刷新（避免舊數據覆蓋新數據）
        if (DATA.exportedAt && d.exportedAt <= DATA.exportedAt) return;
        Object.assign(DATA, d);
        showPanel(currentPanel);
        console.log('📡 即時看板已接收數據:', d.exportedAt);
    }
    try {
        var _rtCh = new BroadcastChannel('fhir-api-channel');
        _rtCh.onmessage = function(ev) {
            if (ev.data && ev.data.data && (ev.data.type === 'update-realtime' || ev.data.type === 'update-public')) {
                _applyRealtimeData(ev.data.data);
            }
        };
    } catch(e) {}

    // localStorage 變更 fallback（跨分頁）
    window.addEventListener('storage', function(ev) {
        if (ev.key === 'fhir-dashboard-api-data' && ev.newValue) {
            try { _applyRealtimeData(JSON.parse(ev.newValue)); } catch(e) {}
        }
    });

    // 輪詢 localStorage（3 秒一次，確保 file:// 和 BroadcastChannel 不通時也能收到）
    var _lastLsCheck = DATA.exportedAt || '';
    setInterval(function() {
        try {
            var raw = localStorage.getItem('fhir-dashboard-api-data');
            if (!raw) return;
            var d = JSON.parse(raw);
            if (d && d.exportedAt && d.exportedAt !== _lastLsCheck) {
                _lastLsCheck = d.exportedAt;
                _applyRealtimeData(d);
            }
        } catch(e) {}
    }, 3000);

    // ─── Multi-Source aggregator integration ───
    if (window.MultiSource) {
        window.MultiSource.init();
        // 以現時 DATA 作為 base，后續輪詢所拿到的新資料也會覆蓋
        window.MultiSource.setBaseData({ exportedAt: DATA.exportedAt || new Date().toISOString(), diseaseItems: DATA.diseaseItems, qualityIndicators: DATA.qualityIndicators, healthIndicators: DATA.healthIndicators, esgIndicators: DATA.esgIndicators });
        window.MultiSource.onUpdate(function(agg) {
            if (agg && window.MultiSource.isEnabled()) {
                if (agg.diseaseItems)      DATA.diseaseItems = agg.diseaseItems;
                if (agg.qualityIndicators) DATA.qualityIndicators = agg.qualityIndicators;
                if (agg.healthIndicators)  DATA.healthIndicators = agg.healthIndicators;
                if (agg.esgIndicators)     DATA.esgIndicators = agg.esgIndicators;
                showPanel(currentPanel);
            }
        });
    }
});
</script>
<script src="js/multi-source-aggregator.js"></script>
</body>
