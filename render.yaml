# Render Blueprint - https://render.com/docs/blueprint-spec
# 部署方式：在 Render Dashboard → New + → Blueprint → 選擇此 Repo
services:
  - type: web
    name: fhir-cql-quality-platform-api
    runtime: node
    plan: free
    region: singapore
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
